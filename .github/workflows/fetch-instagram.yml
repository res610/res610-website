name: Fetch Instagram Posts

on:
    schedule:
        # Run daily at 09:00 JST (00:00 UTC)
        - cron: '0 0 * * *'
    workflow_dispatch:

permissions:
    contents: write

concurrency:
    group: "instagram-fetch"
    cancel-in-progress: true

jobs:
    fetch:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: '22'

            - name: Refresh Instagram token
              env:
                  INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
                  GH_TOKEN: ${{ secrets.GH_PAT_TOKEN }}
              run: |
                  RESPONSE=$(curl -s "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${INSTAGRAM_ACCESS_TOKEN}")
                  NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
                  if [ -n "$NEW_TOKEN" ]; then
                      echo "Token refreshed successfully."
                      gh secret set INSTAGRAM_ACCESS_TOKEN --body "$NEW_TOKEN" || echo "Warning: Failed to update secret, but continuing with refreshed token."
                      echo "INSTAGRAM_ACCESS_TOKEN=$NEW_TOKEN" >> "$GITHUB_ENV"
                  else
                      echo "Token refresh skipped or failed: $RESPONSE"
                      echo "Using existing token."
                      echo "INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}" >> "$GITHUB_ENV"
                  fi

            - name: Fetch Instagram posts
              env:
                  INSTAGRAM_ACCESS_TOKEN: ${{ env.INSTAGRAM_ACCESS_TOKEN }}
                  INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
              run: node scripts/fetch-instagram.mjs

            - name: Check for changes
              id: changes
              run: |
                  git add public/images/instagram/ src/data/instagram.json
                  if git diff --cached --quiet; then
                      echo "changed=false" >> "$GITHUB_OUTPUT"
                  else
                      echo "changed=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Commit and push
              if: steps.changes.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git commit -m "chore: update Instagram feed data"
                  git push
